# AgentOverflow VM stack. Memory caps are sized for e2-standard-4 (16 GB);
# they are limits, not reservations, so the stack still fits after the
# post-ingestion downsize to e2-standard-2 (8 GB).

services:
  qdrant:
    image: qdrant/qdrant:v1.15.1
    restart: unless-stopped
    # Loopback-only: the ingestion pipeline runs on the VM itself; nothing
    # external ever talks to Qdrant directly.
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    mem_limit: 5g
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ao
      POSTGRES_DB: ao
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in deploy/.env}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    mem_limit: 2g
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ao -d ao"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  api:
    build: ../api
    restart: unless-stopped
    # Loopback-only: Caddy (below) is the only path in from the internet. Nothing
    # off-box may reach the API except through TLS termination.
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      AO_INTERNAL_SECRET: ${AO_INTERNAL_SECRET:?set AO_INTERNAL_SECRET in deploy/.env}
      QDRANT_URL: http://qdrant:6333
      PG_DSN: postgresql://ao:${POSTGRES_PASSWORD}@postgres:5432/ao
    mem_limit: 2g
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      # python:3.11-slim has no curl; health requires the internal secret.
      test:
        - CMD
        - python
        - -c
        - "import os,urllib.request as u; u.urlopen(u.Request('http://127.0.0.1:8080/internal/health', headers={'X-AO-Internal-Secret': os.environ['AO_INTERNAL_SECRET']}), timeout=5)"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    # 80 serves the ACME challenge + HTTP->HTTPS redirect; 443 is the real API.
    ports:
      - "80:80"
      - "443:443"
    environment:
      AO_API_HOST: ${AO_API_HOST:?set AO_API_HOST in deploy/.env}
      # Platform host the credit/LLM/MCP endpoints proxy to (the Convex slug).
      AO_CONVEX_HOST: ${AO_CONVEX_HOST:?set AO_CONVEX_HOST in deploy/.env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  qdrant_data:
  pg_data:
  caddy_data:
  caddy_config:
